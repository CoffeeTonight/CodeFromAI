# Campaign slot table — SINGLE SOURCE OF TRUTH (max 60 SCPU/VCPU slots)
#
# Only list *active* slaves here. Unused cpu_id values up to max_slots are
# auto-filled as reserved (enabled: false) — no firmware campaign, no TB steps.
# External SoC: wire AXI + hierarchy only for enabled slots you use.
#
# Fields per active slot:
#   name, cpu_id (1..max_slots), tap_port, role, phase_c, targets[]
#
# master: SCPU0 superset (always generated). enabled defaults to 1 when NUM_SCPU=0
# (solo / MVCPU-only), else 0 (orchestrator-only). Set enabled: 1 to also run FW/icode.

master:
  mode: superset
  name: MSTR
  tap_port: 0
  bus_type: axi4lite
  role: solo
  phase_c: cpu_sfr/phase_c.c
  targets:
    - { sym: SFR_CTRL,     expect: 0x00000001, icode: check_sfr_ctrl }
    - { sym: SFR_CFG,      expect: 0x000000FF, icode: check_sfr_mask }

max_slots: 60

# Words per VCPU firmware region in unified pool (8 KiB = 0x800 words)
pool_word_stride: 0x800

active:
  - name: SFR
    cpu_id: 1
    tap_port: 0
    bus_type: apb3
    bus_port: S01_APB
    role: sfr
    phase_c: cpu_sfr/phase_c.c
    targets:
      - { sym: SFR_CTRL,     expect: 0x00000001, icode: check_sfr_ctrl }
      - { sym: SFR_CFG,      expect: 0x000000FF, icode: check_sfr_mask }

  - name: SRAM
    cpu_id: 2
    tap_port: 1
    bus_type: ahb_lite
    bus_port: M02_AHB
    role: sram
    phase_c: cpu_sram/phase_c.c
    targets:
      - { sym: SRAM_MARKER,  expect: 0xDEADBEEF, icode: check_sram_marker }
      - { sym: SRAM_AUX,     expect: 0xCAFEBABE, icode: check_sram_aux }

  - name: UART
    cpu_id: 3
    tap_port: 2
    bus_type: axi4lite
    bus_port: S03_AXI
    role: uart
    phase_c: cpu_uart/uart_fw.c
    targets:
      - { sym: UART_BAUD,    expect: 0x00000080, icode: check_uart_baud }
      - { sym: UART_IRQ_HANG, expect: 0xDEADDEAD, icode: check_uart_irq }