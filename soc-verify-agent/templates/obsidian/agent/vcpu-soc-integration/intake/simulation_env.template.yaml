    smoke_after_integration: |
      # cd "$RTL_ROOT" && make chip-top-example 2>&1 | tee sim_smoke.log
      null

    # Optional — customer top / injection mode (if different from smoke)
    customer_top: null

    working_directory: null       # default: RTL_ROOT; or absolute path
    env: {}                     # e.g. RTL_ROOT: /path/to/verif_cpu_verilog

  pass:
